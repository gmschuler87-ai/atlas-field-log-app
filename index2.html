<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Daily Field Log V2</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Atlas Field Log">
<meta name="theme-color" content="#1a3a5c">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,Arial,sans-serif);font-size:15px;color:var(--color-text-primary,#1a1a1a);background:var(--color-background-tertiary,#f5f5f3);min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:1rem}
.app-header{position:sticky;top:0;z-index:100;background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));border-radius:0 0 12px 12px;padding:0.6rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;min-height:60px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.logo{width:120px;min-width:120px;display:flex;align-items:center;flex-shrink:0}
.top-nav{display:flex;gap:6px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.log-tab{padding:7px 14px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));border-radius:8px;background:var(--color-background-primary,#fff);cursor:pointer;font-size:13px;color:var(--color-text-secondary,#666);display:flex;align-items:center;gap:4px;white-space:nowrap;user-select:none}
.log-tab.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.xt{font-size:15px;line-height:1;padding:0 2px;opacity:0.7;background:none;border:none;cursor:pointer;color:inherit;font-family:inherit}
.xt:hover{opacity:1}
.lib-tab{padding:7px 14px;border:0.5px solid #534AB7;border-radius:8px;background:var(--color-background-primary,#fff);cursor:pointer;font-size:13px;color:#534AB7;white-space:nowrap;user-select:none}
.lib-tab.active{background:#534AB7;color:#fff}
.new-log-btn{padding:7px 12px;border:0.5px dashed var(--color-border-secondary,rgba(0,0,0,0.3));border-radius:8px;background:none;cursor:pointer;font-size:13px;color:var(--color-text-secondary,#666);font-family:inherit;line-height:1.4}
.new-log-btn:hover{background:var(--color-background-secondary,#f0f0ee)}
.util-btn{padding:7px 12px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));border-radius:8px;background:var(--color-background-primary,#fff);cursor:pointer;font-size:13px;color:var(--color-text-secondary,#666);font-family:inherit;line-height:1.4;white-space:nowrap;display:inline-flex;align-items:center}
.util-btn:hover{background:var(--color-background-secondary,#f0f0ee)}
.stage-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem;background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));border-radius:10px;padding:6px 10px}
.stage-nav-arrow{background:none;border:none;font-size:22px;cursor:pointer;color:var(--color-text-secondary,#666);padding:0 4px;line-height:1;flex-shrink:0;font-family:inherit}
.stage-nav-arrow:disabled{opacity:0.25;cursor:default}
.stage-nav-label{flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--color-text-primary,#1a1a1a)}
.stage-nav-dots{display:flex;gap:5px;justify-content:center;align-items:center;flex-shrink:0}
.stage-dot{width:7px;height:7px;border-radius:50%;background:var(--color-border-secondary,rgba(0,0,0,0.3));transition:background 0.15s}
.stage-dot.active{background:#1a3a5c}
.stage-dot.done{background:#3B6D11}
.stab{display:none}
.card{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.card-title{font-size:13px;font-weight:500;color:var(--color-text-secondary,#666);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
label{font-size:12px;color:var(--color-text-secondary,#666)}
input,select,textarea{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));border-radius:8px;font-size:14px;font-family:inherit;color:var(--color-text-primary,#1a1a1a);background:var(--color-background-primary,#fff);transition:border-color 0.15s,background 0.15s}
input.has-value,select.has-value,textarea.has-value{border-color:#5a9e3a;background:#f4fbf0}
textarea{resize:vertical;line-height:1.5}
.btn{padding:8px 16px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));border-radius:8px;background:var(--color-background-primary,#fff);cursor:pointer;font-size:13px;color:var(--color-text-primary,#1a1a1a);font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--color-background-secondary,#f0f0ee)}
.btn-primary{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.btn-primary:hover{background:#15304d}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{color:#A32D2D;border-color:#A32D2D}
.btn-danger:hover{background:#FCEBEB}
.crew-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.crew-row input{flex:1}
.add-link{font-size:12px;color:#1a3a5c;background:none;border:none;cursor:pointer;padding:4px 0;text-decoration:underline;font-family:inherit;display:block;margin-bottom:10px}
.pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:12px;background:var(--color-background-secondary,#f0f0ee);border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));cursor:pointer;margin:2px 3px 2px 0;color:var(--color-text-primary,#1a1a1a);gap:4px}
.pill:hover,.pill.on{background:#E6F1FB;border-color:#378ADD;color:#0C447C}
.pill.oneoff{background:#E6F1FB;border-color:#378ADD;color:#0C447C;border-style:dashed}
.pill-edit{color:var(--color-text-secondary,#666);font-size:11px;cursor:pointer;opacity:0.7}
.pill-edit:hover{color:#1a3a5c;opacity:1}
.pill-del{color:var(--color-text-secondary,#666);font-size:11px;cursor:pointer;opacity:0.7}
.pill-del:hover{color:#A32D2D;opacity:1}
.field-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.field-row input,.field-row textarea{flex:1}
.field-pills{min-height:20px;margin-bottom:6px}
.scopes{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.scopes label{font-size:13px;display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--color-text-secondary,#666);padding:5px 12px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));border-radius:8px;background:var(--color-background-primary,#fff);user-select:none;transition:all 0.1s}
.scopes label:has(input:checked){background:#E6F1FB;border-color:#378ADD;color:#0C447C;font-weight:500}
.scopes input[type=checkbox]{display:none}
.wx-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.wx-grid-wide{grid-column:1/-1}
.wx-fetch-row{display:flex;gap:8px;align-items:flex-end}
.wx-status-ok{font-size:12px;color:#3B6D11;margin-top:6px;padding:6px 10px;background:#EAF3DE;border-radius:6px;border:0.5px solid #b2d98a}
.wx-status-err{font-size:12px;color:#A32D2D;margin-top:6px;padding:6px 10px;background:#FCEBEB;border-radius:6px;border:0.5px solid #e8b4b4}
.crew-pills-row{display:flex;align-items:baseline;gap:6px;margin-top:6px;flex-wrap:wrap}
.crew-pills-label{font-size:11px;color:var(--color-text-secondary,#666);white-space:nowrap;flex-shrink:0}
.equip-inputs{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.ta-footer{display:flex;gap:6px;padding:5px 8px;background:var(--color-background-secondary,#f0f0ee);border-top:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15))}
.entry-row{display:flex;gap:6px;align-items:flex-start;padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));background:var(--color-background-primary,#fff);transition:background 0.1s}
.entry-row:last-child{border-bottom:none}
.entry-row.drag-over{background:#E6F1FB;border-color:#378ADD}
.entry-drag{cursor:grab;color:var(--color-text-secondary,#666);font-size:16px;padding:2px 2px;user-select:none;flex-shrink:0;margin-top:6px;opacity:0.4}
.entry-drag:hover{opacity:1}
.entry-time{width:72px;flex-shrink:0;padding:10px 8px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));border-radius:6px;font-size:14px;font-family:inherit;background:var(--color-background-primary,#fff)}
.entry-text{flex:1;padding:10px 8px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));border-radius:6px;font-size:14px;font-family:inherit;resize:none;min-height:42px;line-height:1.5;background:var(--color-background-primary,#fff)}
.entry-del{flex-shrink:0;padding:10px 12px;font-size:15px;color:#A32D2D;border:none;background:none;cursor:pointer;opacity:0.5;font-family:inherit}
.entry-del:hover{opacity:1}
.divider{font-size:11px;font-weight:500;color:var(--color-text-secondary,#666);text-transform:uppercase;letter-spacing:0.05em;margin:14px 0 8px;padding-bottom:4px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15))}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));margin-bottom:0;user-select:none}
.acc-hdr-title{font-size:14px;font-weight:500;color:var(--color-text-primary,#1a1a1a)}
.acc-hdr-arrow{font-size:18px;color:var(--color-text-secondary,#666);transition:transform 0.2s}
.acc-hdr.open .acc-hdr-arrow{transform:rotate(90deg)}
.acc-body{overflow:visible;transition:max-height 0.25s ease}
.acc-body.closed{max-height:0!important;overflow:hidden}
.ok{font-size:12px;color:#3B6D11}
.err{font-size:12px;color:#A32D2D}
.action-bar{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.ri{border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));border-radius:8px;padding:12px;margin-bottom:10px;overflow:hidden}
.ri.kept{border-color:#3B6D11;background:#EAF3DE}
.ri.modified{border-color:#BA7517;background:#FAEEDA}
.ri.discarded{opacity:0.4;background:var(--color-background-secondary,#f0f0ee)}
.hidden{display:none!important}
.proj-group{border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));border-radius:12px;margin-bottom:1rem;overflow:hidden}
.proj-group-hdr{background:var(--color-background-secondary,#f0f0ee);padding:10px 1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:500;font-size:14px}
.proj-group-body{background:var(--color-background-primary,#fff)}
.log-entry{padding:10px 1.25rem;border-top:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));display:flex;align-items:center;gap:12px}
.log-entry:hover{background:var(--color-background-secondary,#f0f0ee)}
.draft-badge{font-size:11px;padding:2px 7px;border-radius:20px;background:#FAEEDA;border:0.5px solid #BA7517;color:#633806}
.rpt{font-family:Arial,sans-serif;font-size:10.5px;color:#000;background:#fff}
.rpt table{width:100%;border-collapse:collapse}
.rpt td{border:1px solid #333;padding:3px 5px;vertical-align:top}
.print-card{background:#fff;border-radius:12px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));padding:1rem;overflow-x:auto}
.photo-link-badge{display:block;font-size:11px;padding:2px 7px;border-radius:20px;background:#EDE9FF;border:0.5px solid #7C5CBF;color:#4B2EA0;margin-top:4px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;box-sizing:border-box}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:var(--color-background-primary,#fff);border-radius:12px;padding:1.5rem;width:90%;max-width:460px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15))}
.modal-title{font-size:16px;font-weight:500;margin-bottom:1rem}
.dark{--color-background-primary:#1e1e1e;--color-background-secondary:#2a2a2a;--color-background-tertiary:#141414;--color-text-primary:#e8e8e8;--color-text-secondary:#999;--color-border-secondary:rgba(255,255,255,0.2);--color-border-tertiary:rgba(255,255,255,0.1)}
.dark input,.dark select,.dark textarea{color:#e8e8e8;background:#2a2a2a;border-color:rgba(255,255,255,0.2)}
.dark input.has-value,.dark select.has-value,.dark textarea.has-value{background:#1a2e1a;border-color:#5a9e3a}
.dark .entry-row{background:#1e1e1e}
.dark .ri.kept{background:#1a2e1a;border-color:#3B6D11}
.dark .ri.modified{background:#2a2010;border-color:#BA7517}
.dark .ri.discarded{background:#2a2a2a}
.dark .stab.active,.dark .log-tab.active{background:#0f2238}
.welcome-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:2rem;text-align:center;gap:1.5rem}
.welcome-screen img{width:160px;max-width:80%;object-fit:contain;margin-bottom:0.5rem}
.welcome-screen h1{font-size:22px;font-weight:600;color:var(--color-text-primary,#1a1a1a);margin:0}
.welcome-screen p{font-size:14px;color:var(--color-text-secondary,#666);margin:0;max-width:280px;line-height:1.6}
.welcome-btn{padding:14px 28px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;border:none;transition:opacity 0.15s}
.welcome-btn-primary{background:#1a3a5c;color:#fff}
.welcome-btn-secondary{background:none;border:1.5px solid #534AB7;color:#534AB7}
@media(max-width:600px){.fr2{grid-template-columns:1fr}.entry-row{flex-wrap:wrap;gap:4px}.entry-drag{display:none}.entry-time{width:90px;font-size:16px}.entry-text{width:100%;flex-basis:100%;font-size:16px;min-height:52px}.entry-del{padding:6px 10px;margin-left:auto}.ta-footer{flex-wrap:wrap;gap:6px}.ta-footer .btn-sm{font-size:14px;padding:8px 14px;min-height:42px}}
.notes-fab{position:fixed;bottom:24px;right:20px;z-index:150;background:#1a3a5c;color:#fff;border:none;border-radius:50px;padding:14px 22px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.25);display:none;align-items:center;gap:8px;transition:background 0.15s,transform 0.1s;white-space:nowrap}
.notes-fab:hover{background:#15304d;transform:scale(1.04)}
.notes-fab:active{transform:scale(0.97)}
.notes-fab.visible{display:flex}
@media print{.notes-fab{display:none!important}}
.page-nav-bar{position:sticky;bottom:0;z-index:90;background:var(--color-background-primary,#fff);border-top:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));padding:10px 1rem;display:flex;gap:8px;justify-content:space-between;margin-top:1rem;box-shadow:0 -2px 8px rgba(0,0,0,0.06)}
.page-nav-bar .btn{flex:1;padding:12px 8px;font-size:14px;min-height:48px}
.page-nav-bar .btn-primary{flex:2}
@media print{.page-nav-bar{display:none!important}}
@media print{.top-nav,.stage-tabs,.card:not(.print-card),.action-bar,.app-header{display:none!important}.print-card{border:none;padding:0;border-radius:0}body{background:#fff}.app{padding:0;max-width:100%}@page{margin:0.5in}}
</style>
</head>

/* ── DOM helpers ── */
function el(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function div(cls){return el('div',cls);}
function btn(txt,cls){var b=el('button','btn'+(cls?' '+cls:''));b.textContent=txt;b.type='button';return b;}
function inp(val,ph,cap){var i=el('input');i.type='text';i.value=val||'';i.placeholder=ph||'';i.autocomplete='off';if(cap)capBind(i,cap);return i;}
function ta(val,rows,ph){var t=el('textarea');t.value=val||'';t.rows=rows||2;t.placeholder=ph||'';t.autocomplete='off';return t;}
function lbl(txt){var l=el('label');l.textContent=txt;return l;}
function fg(labelTxt,child){var d=div('fg');d.appendChild(lbl(labelTxt));d.appendChild(child);return d;}
function txt(s){return document.createTextNode(s);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function capWords(s){return s.replace(/\b\w/g,function(c){return c.toUpperCase();});}
function capFirst(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function capBind(e,mode){e.addEventListener('input',function(){var p=this.selectionStart;this.value=mode==='w'?capWords(this.value):capFirst(this.value);this.selectionStart=this.selectionEnd=p;});}
function gv(id){var e=document.getElementById(id);return e?e.value:'';}
function fv(lid,f){var e=document.getElementById('l'+lid+'-'+f);return e?e.value:'';}
function showMsg(id,t,cls,ms){var e=document.getElementById(id);if(!e)return;e.textContent=t;e.className=cls||'ok';e.classList.remove('hidden');if(ms)setTimeout(function(){e.classList.add('hidden');},ms);}
function getCrew(cid){return Array.from(document.querySelectorAll('#'+cid+' .crew-row input:first-child')).map(function(i){return i.value.trim();}).filter(Boolean);}
function getVisitors(lid){var rows=document.querySelectorAll('#l'+lid+'-visitor-crew .crew-row'),r=[];rows.forEach(function(row){var ins=row.querySelectorAll('input');var n=ins[0].value.trim(),o=ins[1]?ins[1].value.trim():'';if(n)r.push(o?n+' ('+o+')':n);});return r;}

/* ── modals ── */
function showConfirm(msg,onYes){
  var ov=div('modal-bg'),box=div('modal-box');box.style.maxWidth='360px';
  var p=div();p.style.cssText='font-size:15px;margin-bottom:1.5rem';p.textContent=msg;
  var bar=div('action-bar');
  var no=btn('Cancel');no.addEventListener('click',function(){ov.remove();});
  var yes=btn('Yes','btn-primary');yes.addEventListener('click',function(){ov.remove();onYes();});
  bar.appendChild(no);bar.appendChild(yes);box.appendChild(p);box.appendChild(bar);ov.appendChild(box);
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
function showAlert(msg,onClose){
  var ov=div('modal-bg'),box=div('modal-box');box.style.maxWidth='360px';
  var p=div();p.style.cssText='font-size:15px;margin-bottom:1.5rem';p.textContent=msg;
  var bar=div('action-bar');
  var ok=btn('OK','btn-primary');ok.addEventListener('click',function(){ov.remove();if(onClose)onClose();});
  bar.appendChild(ok);box.appendChild(p);box.appendChild(bar);ov.appendChild(box);
  document.body.appendChild(ov);
}
function showCloseOptions(lid){
  var ov=div('modal-bg'),box=div('modal-box');box.style.maxWidth='380px';
  var t=div();t.style.cssText='font-size:15px;font-weight:500;margin-bottom:6px';t.textContent='Close "'+logs[lid].label+'"?';
  var s=div();s.style.cssText='font-size:13px;color:var(--color-text-secondary,#666);margin-bottom:1.25rem';s.textContent='What would you like to do with this log?';
  var col=div();col.style.cssText='display:flex;flex-direction:column;gap:8px';
  var ab=btn('Archive — save to library and close','btn-primary');ab.style.width='100%';
  ab.addEventListener('click',function(){ov.remove();archiveLog(lid);});
  var sb=btn('Save as draft and close');sb.style.width='100%';
  sb.addEventListener('click',function(){ov.remove();saveDraft(lid,function(){doCloseLog(lid);});});
  var db=btn('Close without saving','btn-danger');db.style.width='100%';
  db.addEventListener('click',function(){ov.remove();doCloseLog(lid);});
  var cb=btn('Cancel');cb.style.width='100%';cb.addEventListener('click',function(){ov.remove();});
  col.appendChild(ab);col.appendChild(sb);col.appendChild(db);col.appendChild(cb);
  box.appendChild(t);box.appendChild(s);box.appendChild(col);ov.appendChild(box);
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
function archiveLog(lid){
  var entry={id:uid(),lid:lid,date:fv(lid,'date'),proj:fv(lid,'proj'),loc:fv(lid,'loc'),well:fv(lid,'well'),office:fv(lid,'office'),pm:fv(lid,'pm'),label:logs[lid]?logs[lid].label:'',isDraft:true,isArchived:true,scratchpad:fv(lid,'scratchpad'),scratchpadEntries:logs[lid].scratchpadEntries||[],savedAt:new Date().toISOString(),html:''};
  if(!library)library=[];
  library.unshift(entry);saveLibrary();doCloseLog(lid);
  if(logOrder.length>0)showAlert('Log archived. Find it in the Library tab.');
}

/* ── storage ── */
async function storageGet(key){
  try{if(window.storage&&window.storage.get){var r=await window.storage.get(key);return(r&&r.value)?r.value:null;}}catch(e){}
  try{return localStorage.getItem(key);}catch(e){return null;}
}
async function storageSet(key,val){
  try{if(window.storage&&window.storage.set){await window.storage.set(key,val);return;}}catch(e){}
  try{
    localStorage.setItem(key,val);
  }catch(e){
    if(e.name==='QuotaExceededError'||e.code===22){
      try{
        var stripped=JSON.parse(val);
        if(stripped&&stripped.logs){
          Object.keys(stripped.logs).forEach(function(lid){
            if(stripped.logs[lid]&&stripped.logs[lid].photos)stripped.logs[lid].photos=[];

async function fetchWeatherByGPS(lid){
  var st=document.getElementById('l'+lid+'-wx-status');
  if(st){st.className='';st.textContent='📍 Getting your location...';}
  if(!navigator.geolocation){if(st){st.className='wx-status-err';st.textContent='⚠ Geolocation not supported on this device.';}return;}
  navigator.geolocation.getCurrentPosition(async function(pos){
    var lat=pos.coords.latitude,lon=pos.coords.longitude;
    try{
      var wr=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=weathercode,windspeed_10m,winddirection_10m&daily=temperature_2m_max,temperature_2m_min&hourly=temperature_2m&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=auto&forecast_days=1');
      var wd=await wr.json();var c=wd.current;var daily=wd.daily;
      var hi=Math.round(daily.temperature_2m_max[0]),lo=Math.round(daily.temperature_2m_min[0]);
      var we=document.getElementById('l'+lid+'-wx');if(we)we.value=wxCode(c.weathercode);

/* ── library ── */
async function saveToLibrary(lid,html,isDraft){var entry={id:uid(),lid:lid,date:fv(lid,'date'),proj:fv(lid,'proj'),loc:fv(lid,'loc'),well:fv(lid,'well'),office:fv(lid,'office'),pm:fv(lid,'pm'),isDraft:isDraft,label:logs[lid]?logs[lid].label:'',scratchpad:isDraft?fv(lid,'scratchpad'):'',savedAt:new Date().toISOString(),html:html};library.push(entry);await saveLibrary();renderLibrary();}
async function saveDraft(lid,callback){var sv=fv(lid,'scratchpad');library=library.filter(function(e){return!(e.isDraft&&e.lid===lid);});var draftHtml='<div style="padding:1rem;font-size:13px;color:var(--color-text-secondary,#666)"><strong>Draft</strong><br><br><pre style="font-size:12px;white-space:pre-wrap;font-family:inherit">'+esc(sv)+'</pre></div>';await saveToLibrary(lid,draftHtml,true);if(callback)callback();}
function resumeDraft(entry){
  library=library.filter(function(e){return e.id!==entry.id;});saveLibrary();renderLibrary();
  var projData={proj:entry.proj||'',loc:entry.loc||'',well:entry.well||'',office:entry.office||'',pm:entry.pm||''};
  var lid=createLog(entry.label||entry.loc||'Resumed',projData);
  var scratch=document.getElementById('l'+lid+'-scratchpad');if(scratch&&entry.scratchpad)scratch.value=entry.scratchpad;
  if(entry.scratchpadEntries&&entry.scratchpadEntries.length){logs[lid].scratchpadEntries=entry.scratchpadEntries;}
  var dateEl=document.getElementById('l'+lid+'-date');if(dateEl&&entry.date){dateEl.value=entry.date;updateBanner(lid);}
  saveLogs();switchToLog(lid);
}
function renderLibrary(){
  var container=document.getElementById('library-list');
  if(!library.length){container.innerHTML='<p style="font-size:13px;color:var(--color-text-secondary,#666)">No saved reports yet.</p>';return;}
  container.innerHTML='';
  var groups={};library.forEach(function(e){var k=e.proj||'No project number';if(!groups[k])groups[k]=[];groups[k].push(e);});
  Object.keys(groups).sort().forEach(function(proj){
    var entries=groups[proj].slice().reverse();
    var group=div('proj-group'),hdr=div('proj-group-hdr');
    hdr.innerHTML='<span>'+esc(proj)+' <span style="font-weight:400;font-size:12px;color:var(--color-text-secondary,#666)">('+entries.length+' item'+(entries.length>1?'s':'')+')</span></span><span style="font-size:12px">&#9662;</span>';
    var body=div('proj-group-body');var collapsed=false;
    hdr.addEventListener('click',function(){collapsed=!collapsed;body.style.display=collapsed?'none':'block';hdr.querySelector('span:last-child').innerHTML=collapsed?'&#9656;':'&#9662;';});
    entries.forEach(function(entry){
      var row=div('log-entry');
      var d=entry.date?entry.date.split('-'):[];var dateStr=d.length===3?d[1]+'/'+d[2]+'/'+d[0]:entry.date||'Unknown';
      var info=div();info.style.flex='1';
      var topLine=div();topLine.style.cssText='display:flex;align-items:center;gap:6px';
      var dateSpan=div();dateSpan.style.cssText='font-size:13px;font-weight:500';dateSpan.textContent=dateStr;topLine.appendChild(dateSpan);

/* ── move modal ── */
function showMoveModal(fromLid){
  var others=logOrder.filter(function(id){return id!==fromLid;});
  if(!others.length){showAlert('No other logs to move notes to.');return;}
  var ov=div('modal-bg'),box=div('modal-box');box.style.maxWidth='380px';
  var title=div('modal-title');title.textContent='Move notes to...';box.appendChild(title);
  others.forEach(function(toLid){
    var b=btn(getDisplayLabel(toLid)+' - '+(fv(toLid,'loc')||'no site'),'btn');b.style.cssText='width:100%;text-align:left;margin-bottom:8px;display:block';
    b.addEventListener('click',function(){
      ov.remove();showConfirm('Move notes to "'+getDisplayLabel(toLid)+'"? Notes will be appended.',function(){
        var from=document.getElementById('l'+fromLid+'-scratchpad');var to=document.getElementById('l'+toLid+'-scratchpad');
        if(from&&from.value.trim()){if(to){to.value=(to.value.trim()?to.value.trim()+'\n':'')+from.value.trim();}from.value='';saveLogs();showAlert('Notes moved.');}
      });
    });
    box.appendChild(b);
  });
  var cancel=btn('Cancel');cancel.style.cssText='width:100%;margin-top:4px';cancel.addEventListener('click',function(){ov.remove();});
  box.appendChild(cancel);ov.appendChild(box);ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});document.body.appendChild(ov);
}

/* ── PDF export ── */
function exportPDF(lid){
  var el=document.getElementById('l'+lid+'-rpt-out');if(!el)return;
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;font-family:Arial,sans-serif;}@media print{body{margin:0}}</style></head><body>'+el.innerHTML+'<script>window.onload=function(){window.print();}<\/script></body></html>';
  try{var w=window.open('','_blank');if(w){w.document.write(html);w.document.close();return;}}catch(e){}
  try{var blob=new Blob([html],{type:'text/html'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.target='_blank';a.download=(fv(lid,'date')||'report')+'_atlas_field_report.html';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url);},3000);}catch(e){showAlert('Print unavailable. Save the HTML file and open in Chrome to print.');}
}

/* ── backup / restore ── */
async function exportBackup(){
  try{
    var backup={version:2,exportedAt:new Date().toISOString(),store:store,logs:{logs:logs,logOrder:logOrder},library:library};
    var json=JSON.stringify(backup,null,2);var blob=new Blob([json],{type:'application/json'});var url=URL.createObjectURL(blob);
    var a=document.createElement('a');var d=new Date();var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    a.href=url;a.download='atlas-fieldlog-v2-backup-'+ds+'.json';document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  }catch(e){showAlert('Export failed: '+e.message);}
}
async function importBackup(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var backup=JSON.parse(e.target.result);
      if(!backup.store){showAlert('Invalid backup file.');return;}
      showConfirm('Restore from backup dated '+new Date(backup.exportedAt).toLocaleString()+'?\n\nThis will replace all current data.',async function(){
        try{
          if(backup.store){store=backup.store;if(!store.names)store.names={atlas:[],sub:[],visitor:[],client:[]};if(!store.equip)store.equip={items:[],checked:[]};await persist();}
          if(backup.logs){logs=backup.logs.logs||{};logOrder=backup.logs.logOrder||[];await saveLogs();}
          if(backup.library){library=backup.library;await saveLibrary();}
          document.getElementById('log-container').innerHTML='';
          if(!logOrder.length){showWelcome();}else{showMainUI();logOrder.forEach(function(lid){buildLogDOM(lid,null);});renderTabs();switchToLog(logOrder[0]);}
          renderLibrary();showAlert('Restore complete.');
        }catch(err){showAlert('Restore failed: '+err.message);}
      });
    }catch(err){showAlert('Could not read backup file: '+err.message);}
  };
  reader.readAsText(file);
}

/* ── notes fab ── */
var _fabKeyboardHidden=false;
function updateNotesFab(lid,stage){
  var fab=document.getElementById('notes-fab');
  if(!fab)return;
  if(activeLid&&stage!==2&&!_fabKeyboardHidden){fab.classList.add('visible');}else{fab.classList.remove('visible');}
}
// Hide FAB when keyboard appears (input focused), restore when dismissed
document.addEventListener('focusin',function(e){
  if(e.target&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')){
    _fabKeyboardHidden=true;
    var fab=document.getElementById('notes-fab');if(fab)fab.classList.remove('visible');
  }
});
document.addEventListener('focusout',function(){
  setTimeout(function(){
    if(!document.activeElement||document.activeElement.tagName==='BODY'||document.activeElement===document.body){
      _fabKeyboardHidden=false;
      if(activeLid){var cur=getCurrentStage(activeLid);updateNotesFab(activeLid,cur);}
    }
  },150);
});
/* ── init ── */
async function init(){
  document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  await loadStore();await loadLogs();await loadLibrary();
  if(!logOrder.length){showWelcome();}
  else{logOrder.forEach(function(lid){buildLogDOM(lid,null);});renderTabs();switchToLog(logOrder[0]);}
  document.getElementById('new-log-btn').addEventListener('click',function(){showNewLogModal();});
  document.getElementById('lib-tab').addEventListener('click',function(){switchToLibrary();});
  document.getElementById('export-btn').addEventListener('click',exportBackup);
  // Notes FAB
  document.getElementById('notes-fab').addEventListener('click',function(){if(activeLid)goStage(activeLid,2);});
  var darkBtn=document.getElementById('dark-btn');
  if(localStorage.getItem('atlas-dark')==='1'){document.body.classList.add('dark');darkBtn.textContent='☀️';}
  darkBtn.addEventListener('click',function(){var on=document.body.classList.toggle('dark');localStorage.setItem('atlas-dark',on?'1':'0');darkBtn.textContent=on?'☀️':'🌙';});
  var wakeLock=null,wakeBtn=document.getElementById('wake-btn');
  function setWakeBtnOff(){wakeBtn.style.cssText='padding:7px 12px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));border-radius:8px;background:var(--color-background-primary,#fff);cursor:pointer;font-size:13px;color:var(--color-text-secondary,#666);font-family:inherit;line-height:1.4;white-space:nowrap;display:inline-flex;align-items:center;opacity:0.5';wakeBtn.title='Keep screen awake (tap to enable)';}
  function setWakeBtnOn(){wakeBtn.style.cssText='padding:7px 12px;border:1.5px solid #3B6D11;border-radius:8px;background:#EAF3DE;cursor:pointer;font-size:13px;color:#3B6D11;font-family:inherit;line-height:1.4;white-space:nowrap;display:inline-flex;align-items:center;font-weight:600';wakeBtn.title='Screen staying awake (tap to release)';}
  setWakeBtnOff();
  async function requestWake(){try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen');setWakeBtnOn();wakeLock.addEventListener('release',function(){wakeLock=null;setWakeBtnOff();});}}catch(e){}}
  wakeBtn.addEventListener('click',async function(){if(wakeLock){wakeLock.release();}else{await requestWake();}});
  var importInput=document.createElement('input');importInput.type='file';importInput.id='import-input';importInput.accept='.json';
  document.getElementById('file-input-sink').appendChild(importInput);
  importInput.addEventListener('change',function(e){importBackup(e.target.files[0]);e.target.value='';});
  document.getElementById('restore-btn').addEventListener('click',function(){document.getElementById('import-input').click();});
  function markFilled(e){var el=e.target;if(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'){el.classList.toggle('has-value',el.value.trim().length>0);}}
  document.addEventListener('input',markFilled);document.addEventListener('change',markFilled);
  function updateOnlineStatus(){var ind=document.getElementById('offline-indicator');if(!ind)return;ind.style.display=navigator.onLine?'none':'inline';}
  window.addEventListener('online',updateOnlineStatus);window.addEventListener('offline',updateOnlineStatus);updateOnlineStatus();
  setTimeout(function(){document.querySelectorAll('input,textarea,select').forEach(function(el){el.classList.toggle('has-value',el.value.trim().length>0);});},200);
  var autoDraftCache={};
  setInterval(function(){logOrder.forEach(function(lid){var scratch=document.getElementById('l'+lid+'-scratchpad');if(!scratch||!scratch.value.trim())return;if(autoDraftCache[lid]===scratch.value)return;autoDraftCache[lid]=scratch.value;saveDraft(lid,null);});},60000);
}
init();
</script>
