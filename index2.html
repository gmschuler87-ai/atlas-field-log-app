<style>
/* ── Atlas Brand CSS ── */
:root{
  --atlas-primary:#3d6e7e;
  --atlas-primary-dark:#2f5a68;
  --atlas-primary-darker:#1e3d47;
  --atlas-bg:#eef3f5;
  --atlas-bg-card:#ffffff;
  --atlas-bg-subtle:#e4edf0;
  --atlas-text:#1a2e35;
  --atlas-text-secondary:#5a7580;
  --atlas-border:rgba(61,110,126,0.18);
  --atlas-border-strong:rgba(61,110,126,0.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:15px;color:var(--atlas-text);background:var(--atlas-bg);min-height:100vh;overscroll-behavior-x:none}
.app{max-width:900px;margin:0 auto;padding:1rem}
.app-header{position:sticky;top:0;z-index:100;background:var(--atlas-primary-darker);border-bottom:3px solid var(--atlas-primary);padding:0.6rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;min-height:56px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.app-header-title{color:#fff;font-size:16px;font-weight:700;letter-spacing:0.01em;white-space:nowrap}
.app-header-date{color:rgba(255,255,255,0.7);font-size:11px;margin-top:1px}
.logo{width:88px;min-width:88px;display:flex;align-items:center;flex-shrink:0}
.top-nav-fixed{display:flex;gap:6px;margin-bottom:6px;align-items:center;flex-wrap:nowrap;justify-content:center}
.top-nav-logs{display:flex;gap:6px;margin-bottom:1rem;align-items:center;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.top-nav-logs::-webkit-scrollbar{display:none}
.log-tab{padding:7px 14px;border:1px solid var(--atlas-border-strong);border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:var(--atlas-text-secondary);display:flex;align-items:center;gap:4px;white-space:nowrap;user-select:none;font-weight:500}
.log-tab.active{background:var(--atlas-primary);color:#fff;border-color:var(--atlas-primary)}
.xt{font-size:15px;line-height:1;padding:0 2px;opacity:0.7;background:none;border:none;cursor:pointer;color:inherit;font-family:inherit}
.xt:hover{opacity:1}
.lib-tab{padding:7px 14px;border:1px solid var(--atlas-primary);border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:var(--atlas-primary);white-space:nowrap;user-select:none;font-weight:500}
.lib-tab.active{background:var(--atlas-primary);color:#fff}
#safety-tab.active{background:#c0392b !important;color:#fff !important;border-color:#c0392b !important}
.new-log-btn{padding:7px 12px;border:1px dashed var(--atlas-border-strong);border-radius:6px;background:none;cursor:pointer;font-size:13px;color:var(--atlas-text-secondary);font-family:inherit;line-height:1.4;font-weight:500}
.new-log-btn:hover{background:var(--atlas-bg-subtle)}
.util-btn{padding:7px 12px;border:1px solid var(--atlas-border);border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:var(--atlas-text-secondary);font-family:inherit;line-height:1.4;white-space:nowrap;display:inline-flex;align-items:center}
.util-btn:hover{background:var(--atlas-bg-subtle)}
.stage-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem;background:var(--atlas-primary-darker);border-radius:8px;padding:8px 12px;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.stage-nav-arrow{background:none;border:none;font-size:22px;cursor:pointer;color:rgba(255,255,255,0.8);padding:0 4px;line-height:1;flex-shrink:0;font-family:inherit}
.stage-nav-arrow:disabled{opacity:0.25;cursor:default}
.stage-nav-label{flex:1;text-align:center;font-size:14px;font-weight:700;color:#fff;letter-spacing:0.02em}
.stage-nav-dots{display:flex;gap:5px;justify-content:center;align-items:center;flex-shrink:0}
.stage-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);transition:background 0.15s}
.stage-dot.active{background:#fff}
.stage-dot.done{background:rgba(255,255,255,0.65)}
.stab{display:none}
.card{background:var(--atlas-bg-card);border:1px solid var(--atlas-border);border-radius:8px;padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(61,110,126,0.08)}
.card-title{font-size:11px;font-weight:700;color:var(--atlas-primary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--atlas-bg-subtle)}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
label{font-size:12px;font-weight:600;color:var(--atlas-text-secondary);text-transform:uppercase;letter-spacing:0.04em}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--atlas-border-strong);border-radius:6px;font-size:14px;font-family:inherit;color:var(--atlas-text);background:#fff;transition:border-color 0.15s,background 0.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--atlas-primary);box-shadow:0 0 0 3px rgba(61,110,126,0.12)}
input.has-value,select.has-value,textarea.has-value{border-color:#4a9060;background:#f2faf5}
textarea{resize:vertical;line-height:1.5}
.btn{padding:8px 16px;border:1px solid var(--atlas-border-strong);border-radius:6px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:var(--atlas-text);font-family:inherit;white-space:nowrap;transition:all 0.15s}
.btn:hover{background:var(--atlas-bg-subtle);border-color:var(--atlas-primary)}
.btn-primary{background:var(--atlas-primary);color:#fff;border-color:var(--atlas-primary)}
.btn-primary:hover{background:var(--atlas-primary-dark)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{color:#c0392b;border-color:#c0392b}
.btn-danger:hover{background:#fdf0f0}
.crew-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.crew-row input{flex:1}
.add-link{font-size:12px;font-weight:600;color:var(--atlas-primary);background:none;border:none;cursor:pointer;padding:4px 0;text-decoration:underline;font-family:inherit;display:block;margin-bottom:10px}
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;background:var(--atlas-bg-subtle);border:1px solid var(--atlas-border-strong);cursor:pointer;margin:2px 3px 2px 0;color:var(--atlas-text);gap:4px;transition:all 0.1s}
.pill:hover,.pill.on{background:var(--atlas-primary);border-color:var(--atlas-primary);color:#fff}
.pill.oneoff{background:#e8f4f8;border-color:var(--atlas-primary);color:var(--atlas-primary-darker);border-style:dashed}
.pill-edit{font-size:11px;cursor:pointer;opacity:0.6}
.pill-edit:hover{opacity:1}
.pill-del{font-size:11px;cursor:pointer;opacity:0.6}
.pill-del:hover{color:#c0392b;opacity:1}
.field-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.field-row input,.field-row textarea{flex:1}
.field-pills{min-height:20px;margin-bottom:6px}
.scopes{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.scopes label{font-size:13px;font-weight:500;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--atlas-text-secondary);padding:6px 14px;border:1px solid var(--atlas-border-strong);border-radius:6px;background:#fff;user-select:none;transition:all 0.1s}
.scopes label:has(input:checked){background:var(--atlas-primary);border-color:var(--atlas-primary);color:#fff;font-weight:600}
.scopes input[type=checkbox]{display:none}
.wx-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.wx-grid-wide{grid-column:1/-1}
.wx-fetch-row{display:flex;gap:8px;align-items:flex-end}
.wx-status-ok{font-size:12px;color:#2e7d50;margin-top:6px;padding:6px 10px;background:#eaf6ef;border-radius:6px;border:1px solid #a8d5b8}
.wx-status-err{font-size:12px;color:#c0392b;margin-top:6px;padding:6px 10px;background:#fdf0f0;border-radius:6px;border:1px solid #f0b8b8}
.crew-pills-row{display:flex;align-items:baseline;gap:6px;margin-top:6px;flex-wrap:wrap}
.crew-pills-label{font-size:11px;color:var(--atlas-text-secondary);white-space:nowrap;flex-shrink:0}
.equip-inputs{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.ta-footer{display:flex;gap:6px;padding:6px 8px;background:var(--atlas-bg-subtle);border-top:1px solid var(--atlas-border)}
.entry-row{display:flex;gap:6px;align-items:flex-start;padding:6px 8px;border-bottom:1px solid var(--atlas-border);background:#fff;transition:background 0.1s}
.entry-row:last-child{border-bottom:none}
.entry-row.drag-over{background:#e8f4f8;border-color:var(--atlas-primary)}
.entry-drag{cursor:grab;color:var(--atlas-text-secondary);font-size:16px;padding:2px 2px;user-select:none;flex-shrink:0;margin-top:6px;opacity:0.4}
.entry-drag:hover{opacity:1}
.entry-time{width:72px;flex-shrink:0;padding:10px 8px;border:1px solid var(--atlas-border-strong);border-radius:6px;font-size:14px;font-family:inherit;background:#fff}
.entry-text{flex:1;padding:10px 8px;border:1px solid var(--atlas-border-strong);border-radius:6px;font-size:14px;font-family:inherit;resize:none;min-height:42px;line-height:1.5;background:#fff}
.entry-del{flex-shrink:0;padding:10px 12px;font-size:15px;color:#c0392b;border:none;background:none;cursor:pointer;opacity:0.5;font-family:inherit}
.entry-del:hover{opacity:1}
.divider{font-size:11px;font-weight:700;color:var(--atlas-primary);text-transform:uppercase;letter-spacing:0.06em;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--atlas-border)}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;cursor:pointer;border-bottom:1px solid var(--atlas-border);margin-bottom:0;user-select:none}
.acc-hdr-title{font-size:14px;font-weight:700;color:var(--atlas-text)}
.acc-hdr-arrow{font-size:18px;color:var(--atlas-text-secondary);transition:transform 0.2s}
.acc-hdr.open .acc-hdr-arrow{transform:rotate(90deg)}
.acc-body{overflow:visible;transition:max-height 0.25s ease}
.acc-body.closed{max-height:0!important;overflow:hidden}
.ok{font-size:12px;color:#2e7d50}
.err{font-size:12px;color:#c0392b}
.action-bar{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.ri{border:1px solid var(--atlas-border);border-radius:8px;padding:12px;margin-bottom:10px;overflow:hidden}
.ri.kept{border-color:#4a9060;background:#f2faf5}
.ri.modified{border-color:#c8860a;background:#fef8ee}
.ri.discarded{opacity:0.4;background:var(--atlas-bg-subtle)}
.hidden{display:none!important}
.proj-group{border:1px solid var(--atlas-border);border-radius:8px;margin-bottom:1rem;overflow:hidden}
.proj-group-hdr{background:var(--atlas-primary-darker);color:#fff;padding:10px 1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:14px}
.proj-group-body{background:#fff}
.log-entry{padding:10px 1.25rem;border-top:1px solid var(--atlas-border);display:flex;align-items:center;gap:12px}
.log-entry:hover{background:var(--atlas-bg-subtle)}
.draft-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#fef8ee;border:1px solid #c8860a;color:#7a5200;font-weight:600}
.rpt{font-family:Arial,sans-serif;font-size:10.5px;color:#000;background:#fff}
.rpt table{width:100%;border-collapse:collapse}
.rpt td{border:1px solid #333;padding:3px 5px;vertical-align:top}
.print-card{background:#fff;border-radius:8px;border:1px solid var(--atlas-border);padding:1rem;overflow-x:auto}
.photo-link-badge{display:block;font-size:11px;padding:2px 7px;border-radius:20px;background:#e8f4f8;border:1px solid var(--atlas-primary);color:var(--atlas-primary-darker);margin-top:4px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;box-sizing:border-box;font-weight:600}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:#fff;border-radius:10px;padding:1.5rem;width:90%;max-width:460px;border:1px solid var(--atlas-border);box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.modal-title{font-size:16px;font-weight:700;color:var(--atlas-primary-darker);margin-bottom:1rem;padding-bottom:8px;border-bottom:2px solid var(--atlas-bg-subtle)}
.dark{--atlas-primary:#5a9aaa;--atlas-primary-dark:#4a8494;--atlas-primary-darker:#2a5a6a;--atlas-bg:#141e22;--atlas-bg-card:#1e2c32;--atlas-bg-subtle:#243238;--atlas-text:#dce8ec;--atlas-text-secondary:#8ab0bc;--atlas-border:rgba(90,154,170,0.2);--atlas-border-strong:rgba(90,154,170,0.35)}
.dark input,.dark select,.dark textarea{color:#dce8ec;background:#1e2c32;border-color:rgba(90,154,170,0.35)}
.dark .util-btn{background:var(--atlas-bg-card);color:var(--atlas-text-secondary);border-color:var(--atlas-border)}
.dark input.has-value,.dark select.has-value,.dark textarea.has-value{background:#1a2e22;border-color:#4a9060}
.dark .entry-row{background:#1e2c32}
.dark .ri.kept{background:#1a2e22;border-color:#4a9060}
.dark .ri.modified{background:#2a2010;border-color:#c8860a}
.dark .ri.discarded{background:#243238}
.dark .stab.active,.dark .log-tab.active{background:#2a5a6a}
.welcome-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:2rem;text-align:center;gap:1.5rem}
.welcome-screen img{width:280px;height:auto;max-width:85%;object-fit:contain;margin-bottom:0.5rem}
.welcome-screen h1{font-size:24px;font-weight:700;color:var(--atlas-primary-darker);margin:0;letter-spacing:0.01em}
.welcome-screen p{font-size:14px;color:var(--atlas-text-secondary);margin:0;max-width:280px;line-height:1.6}
.welcome-btn{padding:14px 28px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all 0.15s;letter-spacing:0.02em}
.welcome-btn-primary{background:var(--atlas-primary);color:#fff}
.welcome-btn-primary:hover{background:var(--atlas-primary-dark)}
.welcome-btn-secondary{background:none;border:2px solid var(--atlas-primary);color:var(--atlas-primary)}
.welcome-btn-secondary:hover{background:var(--atlas-bg-subtle)}
@media(max-width:600px){.fr2{grid-template-columns:1fr}.entry-row{flex-wrap:wrap;gap:4px}.entry-drag{display:none}.entry-time{width:90px;font-size:16px}.entry-text{width:100%;flex-basis:100%;font-size:16px;min-height:52px}.entry-del{padding:6px 10px;margin-left:auto}.ta-footer{flex-wrap:wrap;gap:6px}.ta-footer .btn-sm{font-size:14px;padding:8px 14px;min-height:42px}}

.page-nav-bar{position:sticky;bottom:0;z-index:90;background:var(--atlas-bg-card);border-top:2px solid var(--atlas-primary);padding:10px 1rem;display:flex;gap:8px;justify-content:space-between;margin-top:1rem;box-shadow:0 -2px 12px rgba(61,110,126,0.15)}
.page-nav-bar .btn{flex:1;padding:12px 8px;font-size:14px;min-height:48px}
.page-nav-bar .btn-primary{flex:2}
@media print{.page-nav-bar{display:none!important}}
@media print{.top-nav,.stage-tabs,.card:not(.print-card),.action-bar,.app-header{display:none!important}.print-card{border:none;padding:0;border-radius:0}body{background:#fff}.app{padding:0;max-width:100%}@page{margin:0.5in}}
</style>
</head>

  <div style="flex:1"></div>
  <button class="util-btn" id="dark-btn" title="Toggle dark mode" style="min-width:120px;justify-content:center"><span id="dark-btn-icon">🌙</span> <span id="dark-btn-label">Dark mode</span></button>
  <button class="util-btn" id="wake-btn" title="Keep screen awake" style="opacity:0.5">👁 Stay awake</button>
  <button class="util-btn" id="export-btn" style="font-size:12px;padding:5px 10px;opacity:0.6">⬇ Backup</button>
  <button class="util-btn" id="restore-btn" style="font-size:12px;padding:5px 10px;opacity:0.6">⬆ Restore</button>
</div>
</div>
<script>
var activeLid=null,logOrder=[],logs={},library=[];
var store={
  names:{atlas:[],sub:[],visitor:[],client:[]},
  visitorOrgs:{},affiliations:{},projects:[],
  fieldOptions:{proj:[],phase:[],loc:[],well:[],miles:[],atlasscope:[],contractorscope:[],office:[],pm:[]},
  equip:{items:['Atlas Vehicle','MultiRae Lite','RKI GX-3R 4-gas meter'],checked:['Atlas Vehicle','MultiRae Lite','RKI GX-3R 4-gas meter']},
  quickPhrases:['H&S tailgate conducted','Work suspended - weather','Scope change:']
};

/* ── DOM helpers ── */
function el(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function div(cls){return el('div',cls);}
function btn(txt,cls){var b=el('button','btn'+(cls?' '+cls:''));b.textContent=txt;b.type='button';return b;}
function inp(val,ph,cap){var i=el('input');i.type='text';i.value=val||'';i.placeholder=ph||'';i.autocomplete='off';if(cap)capBind(i,cap);return i;}
function ta(val,rows,ph){var t=el('textarea');t.value=val||'';t.rows=rows||2;t.placeholder=ph||'';t.autocomplete='off';return t;}
function lbl(txt){var l=el('label');l.textContent=txt;return l;}
function fg(labelTxt,child){var d=div('fg');d.appendChild(lbl(labelTxt));d.appendChild(child);return d;}
function txt(s){return document.createTextNode(s);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function capWords(s){return s.replace(/\b\w/g,function(c){return c.toUpperCase();});}
function capFirst(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function capBind(e,mode){e.addEventListener('input',function(){var p=this.selectionStart;this.value=mode==='w'?capWords(this.value):capFirst(this.value);this.selectionStart=this.selectionEnd=p;});}
function gv(id){var e=document.getElementById(id);return e?e.value:'';}
function fv(lid,f){var e=document.getElementById('l'+lid+'-'+f);return e?e.value:'';}
function showMsg(id,t,cls,ms){var e=document.getElementById(id);if(!e)return;e.textContent=t;e.className=cls||'ok';e.classList.remove('hidden');if(ms)setTimeout(function(){e.classList.add('hidden');},ms);}
function getCrew(cid){return Array.from(document.querySelectorAll('#'+cid+' .crew-row input:first-child')).map(function(i){return i.value.trim();}).filter(Boolean);}
function getVisitors(lid){var rows=document.querySelectorAll('#l'+lid+'-visitor-crew .crew-row'),r=[];rows.forEach(function(row){var ins=row.querySelectorAll('input');var n=ins[0].value.trim(),o=ins[1]?ins[1].value.trim():'';if(n)r.push(o?n+' ('+o+')':n);});return r;}

/* ── modals ── */
function showConfirm(msg,onYes){
  var ov=div('modal-bg'),box=div('modal-box');box.style.maxWidth='360px';
  var p=div();p.style.cssText='font-size:15px;margin-bottom:1.5rem';p.textContent=msg;
  var bar=div('action-bar');
  var no=btn('Cancel');no.addEventListener('click',function(){ov.remove();});
  var yes=btn('Yes','btn-primary');yes.addEventListener('click',function(){ov.remove();onYes();});
  bar.appendChild(no);bar.appendChild(yes);box.appendChild(p);box.appendChild(bar);ov.appendChild(box);
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
function showAlert(msg,onClose){
  var ov=div('modal-bg'),box=div('modal-box');box.style.maxWidth='360px';
  var p=div();p.style.cssText='font-size:15px;margin-bottom:1.5rem';p.textContent=msg;
  var bar=div('action-bar');
  var ok=btn('OK','btn-primary');ok.addEventListener('click',function(){ov.remove();if(onClose)onClose();});
  bar.appendChild(ok);box.appendChild(p);box.appendChild(bar);ov.appendChild(box);
  document.body.appendChild(ov);
}
function showCloseOptions(lid){
  var ov=div('modal-bg'),box=div('modal-box');box.style.maxWidth='380px';
  var t=div();t.style.cssText='font-size:15px;font-weight:500;margin-bottom:6px';t.textContent='Close "'+logs[lid].label+'"?';
  var s=div();s.style.cssText='font-size:13px;color:var(--color-text-secondary,#666);margin-bottom:1.25rem';s.textContent='What would you like to do with this log?';
  var col=div();col.style.cssText='display:flex;flex-direction:column;gap:8px';
  var ab=btn('Archive — save to library and close','btn-primary');ab.style.width='100%';
  ab.addEventListener('click',function(){ov.remove();archiveLog(lid);});
  var sb=btn('Save as draft and close');sb.style.width='100%';
  sb.addEventListener('click',function(){ov.remove();saveDraft(lid,function(){doCloseLog(lid);});});
  var db=btn('Close without saving','btn-danger');db.style.width='100%';
  db.addEventListener('click',function(){ov.remove();doCloseLog(lid);});
  var cb=btn('Cancel');cb.style.width='100%';cb.addEventListener('click',function(){ov.remove();});
  col.appendChild(ab);col.appendChild(sb);col.appendChild(db);col.appendChild(cb);
  box.appendChild(t);box.appendChild(s);box.appendChild(col);ov.appendChild(box);
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
function archiveLog(lid){
  var entry={id:uid(),lid:lid,date:fv(lid,'date'),proj:fv(lid,'proj'),loc:fv(lid,'loc'),well:fv(lid,'well'),office:fv(lid,'office'),pm:fv(lid,'pm'),label:logs[lid]?logs[lid].label:'',isDraft:true,isArchived:true,scratchpad:fv(lid,'scratchpad'),scratchpadEntries:logs[lid].scratchpadEntries||[],savedAt:new Date().toISOString(),html:''};
  if(!library)library=[];
  library.unshift(entry);saveLibrary();doCloseLog(lid);
  if(logOrder.length>0)showAlert('Log archived. Find it in the Library tab.');
}

/* ── storage ── */
async function storageGet(key){
  try{if(window.storage&&window.storage.get){var r=await window.storage.get(key);return(r&&r.value)?r.value:null;}}catch(e){}
  try{return localStorage.getItem(key);}catch(e){return null;}
}
async function storageSet(key,val){
  try{if(window.storage&&window.storage.set){await window.storage.set(key,val);return;}}catch(e){}
  try{
    localStorage.setItem(key,val);
  }catch(e){
    if(e.name==='QuotaExceededError'||e.code===22){
      try{
        var stripped=JSON.parse(val);
        if(stripped&&stripped.logs){
          Object.keys(stripped.logs).forEach(function(lid){
            if(stripped.logs[lid]&&stripped.logs[lid].photos)stripped.logs[lid].photos=[];
            if(stripped.logs[lid]&&stripped.logs[lid].reviewItems)stripped.logs[lid].reviewItems=stripped.logs[lid].reviewItems.map(function(r){return r.type==='photo'?Object.assign({},r,{dataUrl:''}):r;});
          });
          localStorage.setItem(key,JSON.stringify(stripped));
        }
      }catch(e2){}
    }
  }
}
async function loadStore(){
  try{var raw=await storageGet('atlas-store-v2');if(raw){var p=JSON.parse(raw);if(p.names)store.names=p.names;if(p.visitorOrgs)store.visitorOrgs=p.visitorOrgs;if(p.affiliations)store.affiliations=p.affiliations;if(p.projects)store.projects=p.projects;if(p.fieldOptions)store.fieldOptions=p.fieldOptions;if(p.equip)store.equip=p.equip;if(p.quickPhrases)store.quickPhrases=p.quickPhrases;}}catch(e){}
  if(!store.names.atlas)store.names.atlas=[];if(!store.names.sub)store.names.sub=[];if(!store.names.visitor)store.names.visitor=[];if(!store.names.client)store.names.client=[];
  if(!store.visitorOrgs)store.visitorOrgs={};if(!store.affiliations)store.affiliations={};if(!store.fieldOptions)store.fieldOptions={};
  ['proj','phase','loc','well','miles','atlasscope','contractorscope','office','pm'].forEach(function(k){if(!store.fieldOptions[k])store.fieldOptions[k]=[];});
  if(!store.quickPhrases)store.quickPhrases=['H&S tailgate conducted','Work suspended - weather','Scope change:'];
  if(!store.equip.items)store.equip.items=[];if(!store.equip.checked)store.equip.checked=[];
}
async function persist(){try{await storageSet('atlas-store-v2',JSON.stringify(store));}catch(e){}}
async function loadLogs(){try{var raw=await storageGet('atlas-logs-v2');if(raw){var d=JSON.parse(raw);logs=d.logs||{};logOrder=d.logOrder||[];}}catch(e){}}
async function saveLogs(){
  try{
    var logsToSave={};
    Object.keys(logs).forEach(function(lid){
      var l=Object.assign({},logs[lid]);
      l.photos=[];
      if(l.reviewItems)l.reviewItems=l.reviewItems.map(function(r){return r.type==='photo'?Object.assign({},r,{dataUrl:''}):r;});
      logsToSave[lid]=l;
    });
    await storageSet('atlas-logs-v2',JSON.stringify({logs:logsToSave,logOrder:logOrder}));
  }catch(e){}
  checkStorageUsage();
}
function checkStorageUsage(){
  try{var used=0;for(var k in localStorage){if(localStorage.hasOwnProperty(k))used+=localStorage[k].length*2;}var pct=used/(5*1024*1024);var warn=document.getElementById('storage-warn');if(!warn)return;if(pct>0.8){warn.style.display='inline';warn.title='Storage '+(Math.round(pct*100))+'% full.';}else{warn.style.display='none';}}catch(e){}
}
async function loadLibrary(){try{var raw=await storageGet('atlas-library-v2');if(raw)library=JSON.parse(raw);if(!Array.isArray(library))library=[];}catch(e){}}
async function saveLibrary(){try{await storageSet('atlas-library-v2',JSON.stringify(library));}catch(e){}}

/* ── equipment helpers ── */
function getEquipChecked(lid){var base=store.equip.checked.slice();if(logs[lid]&&logs[lid].equipChecked)return logs[lid].equipChecked.slice();return base;}
function renderEquip(lid){
  var c=document.getElementById('l'+lid+'-equip-pills');if(!c)return;c.innerHTML='';
  store.equip.items.forEach(function(item,idx){
    var on=getEquipChecked(lid).indexOf(item)>-1;
    var s=div('pill'+(on?' on':''));s.innerHTML='&#10003; '+esc(item)+'<span class="pill-del" style="margin-left:5px;cursor:pointer" title="Remove from list">×</span>';
    (function(it,i){
      s.addEventListener('click',function(e){if(e.target.classList.contains('pill-del')){e.stopPropagation();delEquip(it,lid);}else toggleEquip(it,lid);});
      if(on)s.classList.add('on');
    })(item,idx);
    c.appendChild(s);
  });
  var oo=logs[lid]?logs[lid].oneOffEquip||[]:[];
  oo.forEach(function(item,idx){
    var s=div('pill oneoff');s.innerHTML='&#10003; '+esc(item)+'<span class="pill-del" style="margin-left:5px">×</span>';
    (function(i){s.querySelector('.pill-del').addEventListener('click',function(e){e.stopPropagation();logs[lid].oneOffEquip.splice(i,1);renderEquip(lid);saveLogs();});})(idx);
    c.appendChild(s);
  });
  if(!store.equip.items.length&&!oo.length)c.innerHTML='<span style="font-size:12px;color:var(--color-text-secondary,#666)">no saved equipment</span>';
}
async function toggleEquip(item,lid){var checked=getEquipChecked(lid);var idx=checked.indexOf(item);if(idx>-1)checked.splice(idx,1);else checked.push(item);if(logs[lid])logs[lid].equipChecked=checked;saveLogs();renderEquip(lid);}
async function saveEquipItem(lid){var i=document.getElementById('l'+lid+'-equip-save-inp'),val=capWords((i.value||'').trim());if(!val)return;if(!store.equip.items.includes(val)){store.equip.items.push(val);store.equip.checked.push(val);var checked=getEquipChecked(lid);if(!checked.includes(val))checked.push(val);if(logs[lid])logs[lid].equipChecked=checked;}await persist();i.value='';logOrder.forEach(function(id){renderEquip(id);});}
async function delEquip(item,lid){store.equip.items=store.equip.items.filter(function(i){return i!==item;});store.equip.checked=store.equip.checked.filter(function(i){return i!==item;});await persist();logOrder.forEach(function(id){renderEquip(id);});}
function addOneOff(lid){var i=document.getElementById('l'+lid+'-equip-oneoff-inp'),val=capWords((i.value||'').trim());if(!val)return;if(!logs[lid].oneOffEquip)logs[lid].oneOffEquip=[];if(!logs[lid].oneOffEquip.includes(val))logs[lid].oneOffEquip.push(val);i.value='';renderEquip(lid);saveLogs();}
function getEquipStr(lid){var oo=logs[lid]?logs[lid].oneOffEquip||[]:[];return getEquipChecked(lid).concat(oo).join(', ');}

/* ── pills (crew / field options) ── */
function makeCrewRow(val){var r=div('crew-row');var i=el('input');i.type='text';i.value=val||'';i.placeholder='Name';i.autocomplete='off';capBind(i,'w');var x=btn('×','btn-sm btn-danger');x.style.cssText='padding:4px 8px;flex-shrink:0';x.addEventListener('click',function(){r.remove();});r.appendChild(i);r.appendChild(x);return r;}
function makeVisitorRow(name,org){var r=div('crew-row');var i1=el('input');i1.type='text';i1.value=name||'';i1.placeholder='Name';i1.autocomplete='off';capBind(i1,'w');var i2=el('input');i2.type='text';i2.value=org||'';i2.placeholder='Organization';i2.autocomplete='off';capBind(i2,'w');var x=btn('×','btn-sm btn-danger');x.style.cssText='padding:4px 8px;flex-shrink:0';x.addEventListener('click',function(){r.remove();});r.appendChild(i1);r.appendChild(i2);r.appendChild(x);return r;}
function makePill(labelTxt,onTap,onEdit,onDel){
  var p=div('pill');var span=el('span');span.textContent=labelTxt;
  if(onTap)p.addEventListener('click',function(e){if(!e.target.classList.contains('pill-edit')&&!e.target.classList.contains('pill-del'))onTap();});
  if(onEdit){var editBtn=el('span','pill-edit');editBtn.textContent='✎';editBtn.title='Edit';editBtn.addEventListener('click',function(e){e.stopPropagation();var nv=prompt('Edit:',labelTxt);if(nv&&nv.trim())onEdit(nv.trim());});p.appendChild(span);p.appendChild(editBtn);}else{p.appendChild(span);}
  if(onDel){var delBtn=el('span','pill-del');delBtn.textContent='×';delBtn.title='Remove';delBtn.addEventListener('click',function(e){e.stopPropagation();onDel();});p.appendChild(delBtn);}
  return p;
}
function mkFieldPills(lid,key,inputEl,fillId){
  function saveVal(){var v=capWords(inputEl.value.trim());if(!v)return;if(!store.fieldOptions[key])store.fieldOptions[key]=[];if(!store.fieldOptions[key].includes(v)){store.fieldOptions[key].push(v);persist();renderFieldPills(lid,key,fillId);showSavedFlash(inputEl);}}
  inputEl.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();saveVal();}});
  inputEl._savePill=saveVal;
}
function showSavedFlash(el){var orig=el.style.borderColor;el.style.borderColor='#3B6D11';el.style.background='#EAF3DE';setTimeout(function(){el.style.borderColor='';el.style.background='';},800);}
function renderFieldPills(lid,key,fillId){
  var c=document.getElementById(fillId);if(!c)return;c.innerHTML='';
  (store.fieldOptions[key]||[]).forEach(function(val,idx){
    (function(v,i){
      var p=makePill(v,
        function(){var el2=document.getElementById('l'+lid+'-'+key);if(el2){el2.value=v;el2.classList.toggle('has-value',true);updateBanner(lid);}},
        function(nv){store.fieldOptions[key][i]=nv;persist();renderFieldPills(lid,key,fillId);},
        function(){store.fieldOptions[key].splice(i,1);persist();renderFieldPills(lid,key,fillId);}
      );
      c.appendChild(p);
    })(val,idx);
  });
}
function renderAllFieldPills(lid){
  ['proj','loc','well','office','pm'].forEach(function(k){renderFieldPills(lid,k,'l'+lid+'-'+k+'-pills');});
}
function mkClientField(lid){
  var clientInp=inp('','e.g. Client name','w');clientInp.id='l'+lid+'-client';
  function saveClient(){var v=capWords(clientInp.value.trim());if(!v)return;if(!store.names.client.includes(v)){store.names.client.push(v);persist();renderClientPills(lid);showSavedFlash(clientInp);}}
  clientInp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();saveClient();}});
  clientInp._savePill=saveClient;
  return clientInp;
}
function renderClientPills(lid){
  var c=document.getElementById('l'+lid+'-client-pills');if(!c)return;c.innerHTML='';
  (store.names.client||[]).forEach(function(val,idx){
    (function(v,i){
      var p=makePill(v,
        function(){var el2=document.getElementById('l'+lid+'-client');if(el2){el2.value=v;el2.classList.toggle('has-value',true);}},
        function(nv){store.names.client[i]=nv;persist();logOrder.forEach(function(id){renderClientPills(id);});},
        function(){store.names.client.splice(i,1);persist();logOrder.forEach(function(id){renderClientPills(id);});}
      );
      c.appendChild(p);
    })(val,idx);
  });
}
function renderPills(lid){
  var pairs=[['atlas','atlas-crew'],['sub','sub-crew']];
  pairs.forEach(function(pair){
    var arr=store.names[pair[0]]||[];
    var cid='l'+lid+'-'+(pair[0]==='atlas'?'atlas-crew':'sub-crew');
    arr.forEach(function(n){if(!getCrew(cid).includes(n))document.getElementById(cid).appendChild(makeCrewRow(n));});
  });
}
async function saveNames(lid,type){
  var arr=type==='atlas'?getCrew('l'+lid+'-atlas-crew'):getCrew('l'+lid+'-sub-crew');
  var key=type==='atlas'?'atlas':'sub';
  arr.forEach(function(n){if(!store.names[key].includes(n))store.names[key].push(n);});
  await persist();showMsg('l'+lid+'-'+type+'-msg','Saved!','ok',2000);
}
function setVal(el,val){if(!el)return;el.value=val;el.classList.toggle('has-value',String(val).trim().length>0);}

/* ── tabs & nav ── */
function getDisplayLabel(lid){var proj=fv(lid,'proj')||'';var idx=logOrder.indexOf(lid)+1;if(proj)return proj+' – Log '+idx;var base=logs[lid]?logs[lid].label:'';return base||('Log '+idx);}
function renderTabs(){
  var logsRow=document.getElementById('top-nav-logs');
  logsRow.querySelectorAll('.log-tab').forEach(function(t){t.remove();});
  var newBtn=document.getElementById('new-log-btn');
  logOrder.forEach(function(lid){
    var t=div('log-tab'+(lid===activeLid?' active':''));
    var lbl2=el('span');lbl2.textContent=getDisplayLabel(lid);lbl2.title='Double-click to rename';
    lbl2.addEventListener('dblclick',function(e){e.stopPropagation();renameLog(lid);});
    var x=el('button','xt');x.textContent='×';
    x.addEventListener('click',function(e){e.stopPropagation();closeLog(lid);});
    t.appendChild(lbl2);t.appendChild(x);
    t.addEventListener('click',function(e){if(e.target===x)return;if(lid===activeLid)return;switchToLog(lid);});
    logsRow.insertBefore(t,newBtn);
  });
}
function renameLog(lid){
  var current=logs[lid].label;
  var ov=div('modal-bg'),box=div('modal-box');box.style.maxWidth='340px';
  var t=div('modal-title');t.textContent='Rename log';box.appendChild(t);
  var i=el('input');i.type='text';i.value=current;
  i.style.cssText='width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:1rem';
  box.appendChild(i);
  var bar=div('action-bar');
  var cancel=btn('Cancel');cancel.addEventListener('click',function(){ov.remove();});
  var save=btn('Save','btn-primary');
  save.addEventListener('click',function(){
    var val=i.value.trim()||current;
    var isDupe=logOrder.some(function(id){return id!==lid&&logs[id]&&logs[id].label===val;});
    if(isDupe){showAlert('A log named "'+val+'" already exists.');return;}
    logs[lid].label=val;saveLogs();renderTabs();logOrder.forEach(function(id){updateBanner(id);});ov.remove();
  });
  i.addEventListener('keydown',function(e){if(e.key==='Enter')save.click();if(e.key==='Escape')ov.remove();});
  bar.appendChild(cancel);bar.appendChild(save);box.appendChild(bar);ov.appendChild(box);
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);setTimeout(function(){i.focus();i.select();},100);
}
function switchToLog(lid){document.getElementById('safety-view').classList.add('hidden');document.getElementById('safety-tab').classList.remove('active');
  activeLid=lid;
  document.getElementById('library-view').classList.add('hidden');
  document.getElementById('lib-tab').classList.remove('active');
  logOrder.forEach(function(id){var p=document.getElementById('l'+id+'-pane');if(p)p.classList.toggle('hidden',id!==lid);});
  renderTabs();updateBanner(lid);

}
function switchToLibrary(){activeLid=null;document.getElementById('safety-view').classList.add('hidden');document.getElementById('safety-tab').classList.remove('active');document.getElementById('library-view').classList.remove('hidden');document.getElementById('lib-tab').classList.add('active');logOrder.forEach(function(id){var p=document.getElementById('l'+id+'-pane');if(p)p.classList.add('hidden');});renderTabs();renderLibrary();var n=document.getElementById('hdr-log-name');var s=document.getElementById('hdr-log-sub');if(n)n.textContent='';if(s)s.textContent='';}
function closeLog(lid){showCloseOptions(lid);}
function buildSafetyView(){
  var sv=document.getElementById('safety-view');
  if(sv._built)return;
  sv._built=true;

  // ── CORE Health card ──
  var coreCard=document.createElement('div');coreCard.className='card';
  coreCard.innerHTML='<div class="card-title" style="color:#c0392b">🚨 Injury &amp; Incident Reporting</div>';

  var coreDesc=document.createElement('div');
  coreDesc.style.cssText='font-size:13px;line-height:1.7;margin-bottom:16px;color:var(--atlas-text)';
  coreDesc.innerHTML='<b>Any injury, illness, or vehicle accident — no matter how minor — must be reported to CORE Health immediately.</b><br><br>'
    +'This includes non-life-threatening injuries, exposure incidents, and all at-fault and non at-fault MVAs. For life-threatening emergencies, call 911 first, then notify CORE Health.<br><br>'
    +'CORE Health is staffed by registered nurses and an occupational medical director — 24 hours a day, 7 days a week.';
  coreCard.appendChild(coreDesc);

  // Big call button

function showMainUI(){document.getElementById('log-container').style.display='';document.getElementById('top-nav').style.display='';document.getElementById('welcome-screen').classList.add('hidden');}
function doCloseLog(lid){var idx=logOrder.indexOf(lid);logOrder.splice(idx,1);delete logs[lid];var p=document.getElementById('l'+lid+'-pane');if(p)p.remove();renderTabs();if(logOrder.length===0){showWelcome();}else{switchToLog(logOrder[Math.min(idx,logOrder.length-1)]);}saveLogs();}
function getCurrentStage(lid){for(var si=1;si<=5;si++){var sp=document.getElementById('l'+lid+'-stage-'+si);if(sp&&!sp.classList.contains('hidden'))return si;}return 1;}
var stageNames=['Project Info','Notes','Field Details','Review','Report'];
function goStage(lid,n){
  [1,2,3,4,5].forEach(function(i){var s=document.getElementById('l'+lid+'-stage-'+i);if(s)s.classList.toggle('hidden',i!==n);});
  // Update compact nav
  var lbl=document.getElementById('l'+lid+'-stage-label');if(lbl)lbl.textContent=n+' · '+stageNames[n-1];
  var prev=document.getElementById('l'+lid+'-prev-arrow');if(prev)prev.disabled=(n===1);
  var next=document.getElementById('l'+lid+'-next-arrow');if(next)next.disabled=(n===5);
  for(var di=1;di<=5;di++){var dot=document.getElementById('l'+lid+'-dot-'+di);if(!dot)continue;dot.className='stage-dot'+(di<n?' done':(di===n?' active':''));}
  saveLogs();
}

/* ── banner ── */
function updateBanner(lid){
  if(lid!==activeLid)return;
  var nameEl=document.getElementById('hdr-log-name');var subEl=document.getElementById('hdr-log-sub');
  if(nameEl){var proj2=fv(lid,'proj')||'';var idx2=logOrder.indexOf(lid)+1;nameEl.textContent=proj2||(logs[lid]?logs[lid].label:'')||('Log '+idx2);}
  var parts=[],proj=fv(lid,'proj'),loc=fv(lid,'loc'),well=fv(lid,'well'),dateVal=fv(lid,'date');
  if(proj)parts.push(proj);if(loc)parts.push(loc);if(well)parts.push(well);
  if(subEl)subEl.textContent=parts.join(' · ')||'';
  // Update sticky header date when log date changes
  if(dateVal){
    var hdrDate=document.getElementById('hdr-date');
    if(hdrDate){
      var dp=dateVal.split('-');
      if(dp.length===3){
        var d=new Date(parseInt(dp[0]),parseInt(dp[1])-1,parseInt(dp[2]));
        hdrDate.textContent=d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
      }
    }
  }
}

function fillProjDD(sel){var cur=sel.value;sel.innerHTML='<option value="">- select a saved project -</option>';store.projects.forEach(function(p){var o=document.createElement('option');o.value=p.key;o.textContent=p.loc+' - '+p.well;if(p.key===cur)o.selected=true;sel.appendChild(o);});}
function refreshAllProjDDs(){logOrder.forEach(function(lid){var s=document.getElementById('l'+lid+'-proj-select');if(s)fillProjDD(s);});}
function loadProjectIntoLog(lid,key){
  if(!key){document.getElementById('l'+lid+'-del-proj-btn').style.display='none';return;}
  var p=store.projects.find(function(x){return x.key===key;});if(!p)return;
  ['office','pm','loc','well','zip'].forEach(function(f){var e=document.getElementById('l'+lid+'-'+f);if(e&&p[f]!==undefined){e.value=p[f]||'';e.classList.toggle('has-value',(p[f]||'').trim().length>0);}});
  document.getElementById('l'+lid+'-del-proj-btn').style.display='inline-block';updateBanner(lid);
}
async function saveProjectFromLog(lid){
  try{
    var loc=fv(lid,'loc').trim(),well=fv(lid,'well').trim();
    if(!loc&&!well){showAlert('Enter a location or well ID first.');return;}
    var entry={key:loc+'|'+well,loc:loc,well:well,office:fv(lid,'office'),pm:fv(lid,'pm'),zip:fv(lid,'zip')};
    store.projects=store.projects.filter(function(p){return p.key!==entry.key;});store.projects.unshift(entry);
    await persist();refreshAllProjDDs();
    var dbtn=document.getElementById('l'+lid+'-del-proj-btn');if(dbtn)dbtn.style.display='inline-block';
    showMsg('l'+lid+'-proj-msg','Saved!','ok',2000);
  }catch(e){showAlert('Save failed: '+e.message);}
}
async function deleteProjectFromLog(lid){var key=fv(lid,'proj-select');if(!key)return;showConfirm('Remove this saved project?',async function(){store.projects=store.projects.filter(function(p){return p.key!==key;});await persist();refreshAllProjDDs();document.getElementById('l'+lid+'-del-proj-btn').style.display='none';});}

/* ── weather ── */
async function fetchWeatherByGPS(lid){
  var st=document.getElementById('l'+lid+'-wx-status');
  if(st){st.className='';st.textContent='📍 Getting your location...';}
  if(!navigator.geolocation){if(st){st.className='wx-status-err';st.textContent='⚠ Geolocation not supported on this device.';}return;}
  navigator.geolocation.getCurrentPosition(async function(pos){
    var lat=pos.coords.latitude,lon=pos.coords.longitude;
    try{
      var wr=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=weathercode,windspeed_10m,winddirection_10m&daily=temperature_2m_max,temperature_2m_min&hourly=temperature_2m&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=auto&forecast_days=1');
      var wd=await wr.json();var c=wd.current;var daily=wd.daily;
      var hi=Math.round(daily.temperature_2m_max[0]),lo=Math.round(daily.temperature_2m_min[0]);
      var we=document.getElementById('l'+lid+'-wx');if(we)we.value=wxCode(c.weathercode);

async function saveToLibrary(lid,html,isDraft){var entry={id:uid(),lid:lid,date:fv(lid,'date'),proj:fv(lid,'proj'),loc:fv(lid,'loc'),well:fv(lid,'well'),office:fv(lid,'office'),pm:fv(lid,'pm'),isDraft:isDraft,label:logs[lid]?logs[lid].label:'',scratchpad:isDraft?fv(lid,'scratchpad'):'',savedAt:new Date().toISOString(),html:html};library.push(entry);await saveLibrary();renderLibrary();}

function resumeDraft(entry){
  library=library.filter(function(e){return e.id!==entry.id;});saveLibrary();renderLibrary();
  var projData={proj:entry.proj||'',loc:entry.loc||'',well:entry.well||'',office:entry.office||'',pm:entry.pm||''};
  var lid=createLog(entry.label||entry.loc||'Resumed',projData);
  var scratch=document.getElementById('l'+lid+'-scratchpad');if(scratch&&entry.scratchpad)scratch.value=entry.scratchpad;
  if(entry.scratchpadEntries&&entry.scratchpadEntries.length){logs[lid].scratchpadEntries=entry.scratchpadEntries;}
  var dateEl=document.getElementById('l'+lid+'-date');if(dateEl&&entry.date){dateEl.value=entry.date;updateBanner(lid);}

}
function renderLibrary(){
  var container=document.getElementById('library-list');
  if(!library.length){container.innerHTML='<p style="font-size:13px;color:var(--color-text-secondary,#666)">No saved reports yet.</p>';return;}
  container.innerHTML='';
  var groups={};library.forEach(function(e){var k=e.proj||'No project number';if(!groups[k])groups[k]=[];groups[k].push(e);});
  Object.keys(groups).sort().forEach(function(proj){
    var entries=groups[proj].slice().reverse();
    var group=div('proj-group'),hdr=div('proj-group-hdr');
    hdr.innerHTML='<span>'+esc(proj)+' <span style="font-weight:400;font-size:12px;color:var(--color-text-secondary,#666)">('+entries.length+' item'+(entries.length>1?'s':'')+')</span></span><span style="font-size:12px">&#9662;</span>';
    var body=div('proj-group-body');var collapsed=false;
    hdr.addEventListener('click',function(){collapsed=!collapsed;body.style.display=collapsed?'none':'block';hdr.querySelector('span:last-child').innerHTML=collapsed?'&#9656;':'&#9662;';});
    entries.forEach(function(entry){
      var row=div('log-entry');
      var d=entry.date?entry.date.split('-'):[];var dateStr=d.length===3?d[1]+'/'+d[2]+'/'+d[0]:entry.date||'Unknown';
      var info=div();info.style.flex='1';
      var topLine=div();topLine.style.cssText='display:flex;align-items:center;gap:6px';
      var dateSpan=div();dateSpan.style.cssText='font-size:13px;font-weight:500';dateSpan.textContent=dateStr;topLine.appendChild(dateSpan);
      if(entry.isArchived){var badge=div('draft-badge');badge.style.cssText='font-size:11px;padding:2px 7px;border-radius:10px;background:#EAF3DE;border:0.5px solid #5a9e3a;color:#3B6D11;font-weight:500';badge.textContent='Archived';topLine.appendChild(badge);}
      else if(entry.isDraft){var badge=div('draft-badge');badge.textContent='Draft';topLine.appendChild(badge);}
      var meta=div();meta.style.cssText='font-size:12px;color:var(--color-text-secondary,#666);margin-top:2px';meta.textContent=(entry.loc||'')+(entry.well?' - '+entry.well:'');
      info.appendChild(topLine);info.appendChild(meta);
      var vb=btn((entry.isDraft||entry.isArchived)?'Resume':'View','btn-sm');vb.addEventListener('click',function(){if(entry.isDraft||entry.isArchived)resumeDraft(entry);else showLibraryReport(entry);});
      var db=btn('Delete','btn-sm btn-danger');db.addEventListener('click',function(){showConfirm('Delete this entry?',function(){library=library.filter(function(e2){return e2.id!==entry.id;});saveLibrary();renderLibrary();});});
      row.appendChild(info);row.appendChild(vb);row.appendChild(db);body.appendChild(row);
    });
    group.appendChild(hdr);group.appendChild(body);container.appendChild(group);
  });
}

  var _swipeStartX=0,_swipeStartY=0,_swipeStartTime=0,_swipeLocked=false;
  pane.addEventListener('touchstart',function(e){
    var t=e.touches[0];
    _swipeStartX=t.clientX;_swipeStartY=t.clientY;
    _swipeStartTime=Date.now();_swipeLocked=false;
  },{passive:true});
  pane.addEventListener('touchmove',function(e){
    var t=e.touches[0];
    var dx=t.clientX-_swipeStartX;
    var dy=t.clientY-_swipeStartY;
    if(Math.abs(dy)>Math.abs(dx)){_swipeLocked=true;return;}
    if(_swipeLocked)return;
    // Only preventDefault when swipe is clearly horizontal and meaningful
    if(Math.abs(dx)>20){e.preventDefault();}
  },{passive:false});
  pane.addEventListener('touchend',function(e){
    if(_swipeLocked)return;
    var t=e.changedTouches[0];
    var dx=t.clientX-_swipeStartX;
    var dy=t.clientY-_swipeStartY;
    var dt=Date.now()-_swipeStartTime;
    // Require horizontal swipe: min 45px, max 500ms, more horizontal than vertical
    if(Math.abs(dx)<45||dt>500||Math.abs(dy)>Math.abs(dx)*0.8)return;
    // Don't fire on inputs or interactive elements
    var target=e.target;
    while(target&&target!==pane){
      if(target.tagName==='INPUT'||target.tagName==='TEXTAREA'||target.tagName==='SELECT')return;

/* ── move modal ── */

  var ov=div('modal-bg'),box=div('modal-box');box.style.maxWidth='380px';

    b.addEventListener('click',function(){
      ov.remove();showConfirm('Move notes to "'+getDisplayLabel(toLid)+'"? Notes will be appended.',function(){
        var from=document.getElementById('l'+fromLid+'-scratchpad');var to=document.getElementById('l'+toLid+'-scratchpad');

      });

  try{var w=window.open('','_blank');if(w){w.document.write(html);w.document.close();return;}}catch(e){}
  try{var blob=new Blob([html],{type:'text/html'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.target='_blank';a.download=(fv(lid,'date')||'report')+'_atlas_field_report.html';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url);},3000);}catch(e){showAlert('Print unavailable. Save the HTML file and open in Chrome to print.');}
}

/* ── backup / restore ── */
async function exportBackup(){
  try{
    var backup={version:2,exportedAt:new Date().toISOString(),store:store,logs:{logs:logs,logOrder:logOrder},library:library};
    var json=JSON.stringify(backup,null,2);var blob=new Blob([json],{type:'application/json'});var url=URL.createObjectURL(blob);
    var a=document.createElement('a');var d=new Date();var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    a.href=url;a.download='atlas-fieldlog-v2-backup-'+ds+'.json';document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  }catch(e){showAlert('Export failed: '+e.message);}
}
async function importBackup(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var backup=JSON.parse(e.target.result);
      if(!backup.store){showAlert('Invalid backup file.');return;}
      showConfirm('Restore from backup dated '+new Date(backup.exportedAt).toLocaleString()+'?\n\nThis will replace all current data.',async function(){
        try{
          if(backup.store){store=backup.store;if(!store.names)store.names={atlas:[],sub:[],visitor:[],client:[]};if(!store.equip)store.equip={items:[],checked:[]};await persist();}
          if(backup.logs){logs=backup.logs.logs||{};logOrder=backup.logs.logOrder||[];await saveLogs();}
          if(backup.library){library=backup.library;await saveLibrary();}
          document.getElementById('log-container').innerHTML='';
          if(!logOrder.length){showWelcome();}else{showMainUI();logOrder.forEach(function(lid){buildLogDOM(lid,null);});renderTabs();switchToLog(logOrder[0]);}
          renderLibrary();showAlert('Restore complete.');
        }catch(err){showAlert('Restore failed: '+err.message);}
      });
    }catch(err){showAlert('Could not read backup file: '+err.message);}
  };
  reader.readAsText(file);
}

/* ── init ── */
async function init(){
  document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  await loadStore();await loadLogs();await loadLibrary();
  if(!logOrder.length){showWelcome();}
  else{logOrder.forEach(function(lid){buildLogDOM(lid,null);});renderTabs();switchToLog(logOrder[0]);}
  document.getElementById('new-log-btn').addEventListener('click',function(){showNewLogModal();});
  document.getElementById('lib-tab').addEventListener('click',function(){switchToLibrary();});
  document.getElementById('safety-tab').addEventListener('click',function(){switchToSafety();});
  document.getElementById('export-btn').addEventListener('click',exportBackup);
  var darkBtn=document.getElementById('dark-btn');
  var darkIcon=document.getElementById('dark-btn-icon');
  var darkLabel=document.getElementById('dark-btn-label');
  function setDarkMode(on){
    document.body.classList.toggle('dark',on);
    if(darkIcon)darkIcon.textContent=on?'☀️':'🌙';
    if(darkLabel)darkLabel.textContent=on?'Light mode':'Dark mode';
    if(darkLabel)darkLabel.style.color='';
  }
  if(localStorage.getItem('atlas-dark')==='1'){setDarkMode(true);}
  darkBtn.addEventListener('click',function(){var on=document.body.classList.toggle('dark');localStorage.setItem('atlas-dark',on?'1':'0');setDarkMode(on);});
  var wakeLock=null,wakeBtn=document.getElementById('wake-btn');
  function setWakeBtnOff(){wakeBtn.style.cssText='padding:7px 12px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));border-radius:8px;background:var(--color-background-primary,#fff);cursor:pointer;font-size:13px;color:var(--color-text-secondary,#666);font-family:inherit;line-height:1.4;white-space:nowrap;display:inline-flex;align-items:center;opacity:0.5';wakeBtn.title='Keep screen awake (tap to enable)';}
  function setWakeBtnOn(){wakeBtn.style.cssText='padding:7px 12px;border:1.5px solid #3B6D11;border-radius:8px;background:#EAF3DE;cursor:pointer;font-size:13px;color:#3B6D11;font-family:inherit;line-height:1.4;white-space:nowrap;display:inline-flex;align-items:center;font-weight:600';wakeBtn.title='Screen staying awake (tap to release)';}
  setWakeBtnOff();
  async function requestWake(){try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen');setWakeBtnOn();wakeLock.addEventListener('release',function(){wakeLock=null;setWakeBtnOff();});}}catch(e){}}
  wakeBtn.addEventListener('click',async function(){if(wakeLock){wakeLock.release();}else{await requestWake();}});
  var importInput=document.createElement('input');importInput.type='file';importInput.id='import-input';importInput.accept='.json';
  document.getElementById('file-input-sink').appendChild(importInput);
  importInput.addEventListener('change',function(e){importBackup(e.target.files[0]);e.target.value='';});
  document.getElementById('restore-btn').addEventListener('click',function(){document.getElementById('import-input').click();});
  function markFilled(e){var el=e.target;if(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'){el.classList.toggle('has-value',el.value.trim().length>0);}}
  document.addEventListener('input',markFilled);document.addEventListener('change',markFilled);

}
